<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Expense Tracker</h1>
    <p>Total Balance: <span id="balance" aria-live="polite" aria-atomic="true">$0.00</span></p>
  </header>

  <main>
    <section aria-labelledby="form-heading">
      <h2 id="form-heading">Add a Transaction</h2>
      <form id="expense-form" novalidate>
        <div class="form-group">
          <label for="name">Item Name</label>
          <input
            type="text"
            id="name"
            name="name"
            autocomplete="off"
            placeholder="e.g. Coffee"
          />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            name="amount"
            min="0.01"
            step="0.01"
            placeholder="e.g. 4.50"
          />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">-- Select a category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>

        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <section aria-labelledby="transactions-heading">
      <h2 id="transactions-heading">Transactions</h2>
      <div id="transaction-list" role="list" aria-label="Transaction list">
        <!-- Transactions rendered here by app.js -->
      </div>
    </section>

    <section aria-labelledby="chart-heading">
      <h2 id="chart-heading">Spending by Category</h2>
      <canvas
        id="pie-chart"
        width="300"
        height="300"
        aria-label="Pie chart showing spending by category"
        role="img"
        tabindex="0"
      ></canvas>
      <div id="chart-legend" aria-label="Chart legend">
        <!-- Legend rendered here by app.js -->
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js" type="module"></script>
</body>
</body>
</html>
